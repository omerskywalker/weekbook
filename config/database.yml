default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("PGHOST", "localhost") %>
  port: <%= ENV.fetch("PGPORT", 5432) %>
  username: <%= ENV.fetch("PGUSER", "postgres") %>
  password: <%= ENV.fetch("PGPASSWORD", "postgres") %>

development:
  <<: *default
  database: weekbook_development

test:
  <<: *default
  database: weekbook_test

production:
  <<: *default
  database: weekbook_production
  username: weekbook
  password: <%= ENV["WEEKBOOK_DATABASE_PASSWORD"] %>
